<div id="team-chat-root" class="team-chat-root" aria-live="polite">
<div class="team-chat-fab-stack" id="team-chat-fab-stack">
<button type="button" id="team-chat-fab-pop" class="team-chat-fab-pop" style="display:none;" aria-label="Gelen mesaj önizlemesi">
<div class="team-chat-fab-pop-inner">
<div id="team-chat-fab-pop-from" class="team-chat-fab-pop-from"></div>
<div id="team-chat-fab-pop-text" class="team-chat-fab-pop-text"></div>
</div>
</button>
<button type="button" id="team-chat-fab" class="team-chat-fab" aria-label="Ekip sohbeti" title="Sohbet">
<div class="team-chat-fab-aurora fluid-aurora fluid-aurora--chat-fab" aria-hidden="true"></div>
<div class="team-chat-fab-inner">
<i class="ph ph-chats-circle" style="font-size:22px;"></i>
<span id="team-chat-badge" class="team-chat-badge" style="display:none;">0</span>
</div>
</button>
</div>
<div id="team-chat-panel" class="team-chat-panel" style="display:none;">
<div class="team-chat-panel-head">
<div class="team-chat-head-left">
<span class="team-chat-panel-title">Sohbet</span>
<div id="team-chat-mode-wrap" class="team-chat-mode-wrap" style="display:none;">
<button type="button" class="team-chat-mode-pill active" data-mode="firm">Firma</button>
<button type="button" class="team-chat-mode-pill" data-mode="global">Tümü</button>
</div>
</div>
<button type="button" id="team-chat-close" class="team-chat-icon-btn team-chat-close-btn" aria-label="Kapat"><i class="ph ph-x"></i></button>
</div>
<div class="team-chat-panel-body">
<div id="team-chat-firm-layout" class="team-chat-firm-layout">
<div class="team-chat-groups-col">
<div class="team-chat-groups-toolbar">
<button type="button" id="team-chat-quick-dm" class="btn btn-sm btn-secondary team-chat-btn-quick" style="display:none;">Hızlı mesaj</button>
<button type="button" id="team-chat-new-group" class="btn btn-sm btn-secondary team-chat-btn-new" style="display:none;">+ Grup</button>
</div>
<div id="team-chat-group-list" class="team-chat-group-list"></div>
</div>
<div class="team-chat-main-col">
<div id="team-chat-messages" class="team-chat-messages"></div>
<div id="team-chat-compose-wrap" class="team-chat-compose-wrap">
<div class="team-chat-compose">
<input type="file" id="team-chat-file" accept="image/*,audio/*,.pdf,.doc,.docx,.xlsx,.zip" style="display:none"/>
<button type="button" class="team-chat-icon-btn" onclick="document.getElementById('team-chat-file').click()" title="Dosya / görsel"><i class="ph ph-paperclip"></i></button>
<button type="button" id="team-chat-mic" class="team-chat-icon-btn" title="Sesli mesaj"><i class="ph ph-microphone"></i></button>
<input type="text" id="team-chat-input" class="form-input team-chat-input" placeholder="Mesaj yazın…" autocomplete="off"/>
<button type="button" id="team-chat-send" class="btn btn-primary btn-sm team-chat-send-btn"><i class="ph ph-paper-plane-tilt"></i></button>
</div>
</div>
</div>
</div>
<div id="team-chat-global-feed" class="team-chat-global-feed" style="display:none;">
<div class="team-chat-global-hint"><i class="ph ph-info"></i> Tüm firmalardaki son mesajlar. Yanıtlamak için satıra tıklayın.</div>
<div id="team-chat-global-list" class="team-chat-global-list"></div>
</div>
</div>
</div>
<div id="team-chat-quick-modal" class="team-chat-modal" style="display:none;">
<div class="team-chat-modal-card">
<h3 style="margin:0 0 8px;font-size:15px;">Hızlı mesaj</h3>
<p class="team-chat-muted" style="margin:0 0 12px;font-size:12px;">Seçtiğiniz kişiyle birebir sohbet açılır (aynı firma bağlamında).</p>
<select id="team-chat-quick-user" class="form-input" style="width:100%;margin-bottom:12px;">
<option value="">Kişi seçin…</option>
</select>
<div style="display:flex;gap:8px;justify-content:flex-end;">
<button type="button" class="btn btn-secondary btn-sm" id="team-chat-quick-cancel">İptal</button>
<button type="button" class="btn btn-primary btn-sm" id="team-chat-quick-go">Sohbeti aç</button>
</div>
</div>
</div>
<div id="team-chat-group-modal" class="team-chat-modal" style="display:none;">
<div class="team-chat-modal-card">
<h3 style="margin:0 0 12px;font-size:15px;">Yeni grup</h3>
<input type="text" id="team-chat-group-name" class="form-input" placeholder="Grup adı" style="margin-bottom:12px;width:100%;"/>
<div id="team-chat-group-members" class="team-chat-member-pick"></div>
<div style="display:flex;gap:8px;justify-content:flex-end;margin-top:14px;">
<button type="button" class="btn btn-secondary btn-sm" id="team-chat-group-cancel" onclick="closeNewGroupModal()">İptal</button>
<button type="button" class="btn btn-primary btn-sm" id="team-chat-save-group">Oluştur</button>
</div>
</div>
</div>
</div>
<div id="team-chat-members-modal" class="team-chat-modal" style="display:none;">
<div class="team-chat-modal-card team-chat-modal-card--wide">
<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
<h3 id="team-chat-members-title" style="margin:0;font-size:15px;">Grup üyeleri</h3>
<button type="button" id="team-chat-members-close" class="team-chat-icon-btn" onclick="closeMembersModal()"><i class="ph ph-x"></i></button>
</div>
<div id="team-chat-members-list" class="team-chat-members-list"></div>
<div id="team-chat-members-add"></div>
</div>
</div>
