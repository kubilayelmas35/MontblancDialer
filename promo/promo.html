<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Montblanc Dialer Promo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,600;0,9..40,800;1,9..40,400&display=swap" rel="stylesheet" />
  <style>
    :root {
      --gold: #b8860b;
      --gold-light: #d4a017;
      --gold-soft: rgba(184, 134, 11, 0.15);
      --bg: #0d0f14;
      --bg2: #13161e;
      --text: #f0f2f8;
      --text2: #9ca3af;
      --green: #22c55e;
      --blue: #2563eb;
      --slide-ms: 9000;
      --total-slides: 6;
      --dur: calc(var(--slide-ms) * var(--total-slides));
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 100%; overflow: hidden;
      font-family: 'DM Sans', system-ui, sans-serif;
      background: var(--bg); color: var(--text);
    }
    body[data-orient="vertical"] { --w: 1080px; --h: 1920px; }
    body[data-orient="horizontal"] { --w: 1920px; --h: 1080px; }

    .stage {
      width: var(--w); height: var(--h);
      position: relative; overflow: hidden;
      background: radial-gradient(ellipse 80% 60% at 50% 0%, #1a1520 0%, var(--bg) 55%);
    }
    .grain {
      position: absolute; inset: 0; opacity: 0.04; pointer-events: none;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    }
    .slides {
      width: 100%; height: 100%;
      animation: carousel var(--dur) linear forwards;
    }
    @keyframes carousel {
      0%, 15.5% { transform: translateY(0); }
      16.66%, 32.1% { transform: translateY(calc(-1 * var(--h))); }
      33.33%, 48.8% { transform: translateY(calc(-2 * var(--h))); }
      50%, 65.5% { transform: translateY(calc(-3 * var(--h))); }
      66.66%, 82.1% { transform: translateY(calc(-4 * var(--h))); }
      83.33%, 100% { transform: translateY(calc(-5 * var(--h))); }
    }
    .slide {
      width: var(--w); height: var(--h);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 80px 72px;
      text-align: center;
      position: relative;
    }
    body[data-orient="horizontal"] .slide {
      flex-direction: row; text-align: left; gap: 64px;
      padding: 64px 96px;
    }
    body[data-orient="horizontal"] .slide-copy { flex: 1; max-width: 720px; }
    body[data-orient="horizontal"] .slide-visual { flex: 1; display: flex; justify-content: center; }

    .logo-mark {
      width: 88px; height: 88px; border-radius: 22px;
      background: linear-gradient(135deg, var(--gold-light), var(--gold));
      display: flex; align-items: center; justify-content: center;
      font-size: 42px; font-weight: 800; color: #0d0f14;
      box-shadow: 0 12px 40px rgba(184, 134, 11, 0.35);
      margin-bottom: 32px;
    }
    body[data-orient="horizontal"] .logo-mark { margin-bottom: 24px; }
    h1 {
      font-size: clamp(48px, 5.5vw, 72px); font-weight: 800;
      line-height: 1.08; letter-spacing: -0.02em;
      margin-bottom: 20px;
    }
    h1 span { color: var(--gold-light); }
    .sub {
      font-size: clamp(22px, 2.4vw, 32px); color: var(--text2);
      line-height: 1.45; max-width: 820px;
    }
    body[data-orient="horizontal"] .sub { max-width: none; }
    .badge-row {
      display: flex; flex-wrap: wrap; gap: 12px;
      justify-content: center; margin-top: 36px;
    }
    body[data-orient="horizontal"] .badge-row { justify-content: flex-start; }
    .badge {
      padding: 10px 20px; border-radius: 999px;
      background: var(--gold-soft); border: 1px solid rgba(184,134,11,0.35);
      font-size: 18px; font-weight: 600; color: var(--gold-light);
    }
    .icon-title {
      font-size: clamp(40px, 4.5vw, 56px); font-weight: 800;
      margin-bottom: 16px; line-height: 1.1;
    }
    .icon-title .emoji { font-size: 0.85em; margin-right: 8px; }

    /* Mock UI cards */
    .mock {
      background: var(--bg2); border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px; padding: 28px;
      box-shadow: 0 24px 64px rgba(0,0,0,0.45);
      width: min(520px, 90vw);
      animation: float 4s ease-in-out infinite;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }
    body[data-orient="vertical"] .mock { margin-top: 48px; }
    .mock-hdr {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 20px; font-size: 14px; color: var(--text2);
    }
    .dot { width: 10px; height: 10px; border-radius: 50%; }
    .dot-g { background: var(--green); box-shadow: 0 0 12px var(--green); }
    .mock-btn {
      width: 100%; padding: 18px; border-radius: 14px; border: none;
      background: linear-gradient(135deg, var(--green), #16a34a);
      color: #fff; font-size: 20px; font-weight: 800; margin-top: 12px;
    }
    .mock-row {
      display: flex; gap: 12px; margin-top: 16px;
    }
    .mock-stat {
      flex: 1; background: rgba(255,255,255,0.04);
      border-radius: 12px; padding: 16px; text-align: center;
    }
    .mock-stat b { display: block; font-size: 28px; color: var(--gold-light); }
    .mock-stat small { color: var(--text2); font-size: 13px; }
    .bars { display: flex; align-items: flex-end; gap: 8px; height: 100px; margin-top: 16px; }
    .bar {
      flex: 1; background: linear-gradient(180deg, var(--blue), #1d4ed8);
      border-radius: 6px 6px 0 0; min-height: 20px;
    }
    .cal-grid {
      display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; margin-top: 12px;
    }
    .cal-cell {
      aspect-ratio: 1; border-radius: 8px; background: rgba(255,255,255,0.05);
      font-size: 11px; display: flex; align-items: center; justify-content: center;
      color: var(--text2);
    }
    .cal-cell.on { background: var(--gold-soft); color: var(--gold-light); font-weight: 700; }
    .flags { display: flex; gap: 16px; justify-content: center; margin-top: 32px; font-size: 48px; }
    body[data-orient="horizontal"] .flags { justify-content: flex-start; }
    .cta {
      margin-top: 40px; font-size: 28px; font-weight: 800;
      color: var(--gold-light);
    }
    .version {
      position: absolute; bottom: 48px; left: 0; right: 0;
      text-align: center; font-size: 16px; color: var(--text2);
    }
    body[data-orient="horizontal"] .version { text-align: left; left: 96px; right: auto; }
    .progress {
      position: absolute; bottom: 0; left: 0; height: 4px;
      background: var(--gold); animation: prog var(--dur) linear forwards;
    }
    @keyframes prog { from { width: 0; } to { width: 100%; } }
  </style>
</head>
<body data-orient="vertical" data-lang="tr">
  <div class="stage">
    <div class="grain"></div>
    <div class="progress"></div>
    <div class="slides" id="slides"></div>
  </div>
  <script>
    const COPY = {
      tr: {
        s1h: 'Montblanc <span>Dialer</span>',
        s1sub: 'Profesyonel çağrı merkezi — tarayıcıdan, anında.',
        b1: ['WebRTC', 'Otomatik arama', 'Telnyx'],
        s2h: 'Otomatik arama & WebRTC',
        s2sub: 'Kampanya seç, Hazır\'a bas — sistem sıradaki numarayı arar. Mikrofon tarayıcıda, kurulum yok.',
        ready: 'Hazır — Aramayı Başlat',
        live: 'Hat bağlantısı hazır',
        s3h: 'Canlı istatistikler',
        s3sub: 'Dashboard ve performans panelleri — çağrı, termin ve başarı oranı anlık.',
        stat1: 'Çağrı', stat2: 'Termin', stat3: 'Başarı %',
        s4h: 'Takvim & termin',
        s4sub: 'Slot seç, randevu kaydet — dialer ile takvim tek akışta.',
        s5h: 'TR · DE · Çok kiracılı',
        s5sub: 'Türkçe ve Almanca arayüz. Firma bazlı güvenli altyapı, rol ve yetki yönetimi.',
        s6h: 'Canlıya hazır',
        s6sub: 'Telnyx SIP + DID ile gerçek trafik. Test modundan üretime tek tık.',
        cta: 'montblanc-dialer · v8.20',
        ver: 'Montblanc Dialer v8.20',
      },
      de: {
        s1h: 'Montblanc <span>Dialer</span>',
        s1sub: 'Professionelles Callcenter — direkt im Browser.',
        b1: ['WebRTC', 'Autowähl', 'Telnyx'],
        s2h: 'Autowähl & WebRTC',
        s2sub: 'Kampagne wählen, Bereit — das System wählt die nächste Nummer. Mikrofon im Browser, keine Installation.',
        ready: 'Bereit — Start',
        live: 'Verbindung bereit',
        s3h: 'Echtzeit-Statistiken',
        s3sub: 'Dashboard und Performance — Anrufe, Termine und Quote live.',
        stat1: 'Anrufe', stat2: 'Termine', stat3: 'Quote %',
        s4h: 'Kalender & Termine',
        s4sub: 'Slot wählen, Termin buchen — Dialer und Kalender in einem Flow.',
        s5h: 'TR · DE · Mandantenfähig',
        s5sub: 'Türkisch und Deutsch. Sichere Multi-Tenant-Infrastruktur mit Rollen.',
        s6h: 'Produktionsbereit',
        s6sub: 'Telnyx SIP + DID für echten Traffic. Vom Testmodus in den Live-Betrieb.',
        cta: 'montblanc-dialer · v8.20',
        ver: 'Montblanc Dialer v8.20',
      },
    };

    const params = new URLSearchParams(location.search);
    const lang = params.get('lang') === 'de' ? 'de' : 'tr';
    const orient = params.get('orient') === 'horizontal' ? 'horizontal' : 'vertical';
    document.body.dataset.lang = lang;
    document.body.dataset.orient = orient;
    document.documentElement.lang = lang;

    const c = COPY[lang];
    const slides = document.getElementById('slides');

    slides.innerHTML = `
      <section class="slide">
        <div class="slide-copy">
          <div class="logo-mark">M</div>
          <h1>${c.s1h}</h1>
          <p class="sub">${c.s1sub}</p>
          <div class="badge-row">${c.b1.map((b) => `<span class="badge">${b}</span>`).join('')}</div>
        </div>
      </section>
      <section class="slide">
        <div class="slide-copy">
          <div class="icon-title"><span class="emoji">📞</span>${c.s2h}</div>
          <p class="sub">${c.s2sub}</p>
        </div>
        <div class="slide-visual">
          <div class="mock">
            <div class="mock-hdr"><span class="dot dot-g"></span>${c.live}</div>
            <button class="mock-btn" type="button">${c.ready}</button>
            <div class="mock-row">
              <div class="mock-stat"><b>847</b><small>${lang === 'tr' ? 'Kuyruk' : 'Queue'}</small></div>
              <div class="mock-stat"><b>02:34</b><small>${lang === 'tr' ? 'Süre' : 'Dauer'}</small></div>
            </div>
          </div>
        </div>
      </section>
      <section class="slide">
        <div class="slide-copy">
          <div class="icon-title"><span class="emoji">📊</span>${c.s3h}</div>
          <p class="sub">${c.s3sub}</p>
        </div>
        <div class="slide-visual">
          <div class="mock">
            <div class="mock-row">
              <div class="mock-stat"><b>128</b><small>${c.stat1}</small></div>
              <div class="mock-stat"><b>24</b><small>${c.stat2}</small></div>
              <div class="mock-stat"><b>18%</b><small>${c.stat3}</small></div>
            </div>
            <div class="bars">
              <div class="bar" style="height:45%"></div>
              <div class="bar" style="height:70%"></div>
              <div class="bar" style="height:55%"></div>
              <div class="bar" style="height:90%"></div>
              <div class="bar" style="height:65%"></div>
              <div class="bar" style="height:80%"></div>
            </div>
          </div>
        </div>
      </section>
      <section class="slide">
        <div class="slide-copy">
          <div class="icon-title"><span class="emoji">📅</span>${c.s4h}</div>
          <p class="sub">${c.s4sub}</p>
        </div>
        <div class="slide-visual">
          <div class="mock">
            <div class="mock-hdr">${lang === 'tr' ? 'Haftalık takvim' : 'Wochenkalender'}</div>
            <div class="cal-grid">
              ${Array.from({ length: 28 }, (_, i) => `<div class="cal-cell${[5, 12, 19].includes(i) ? ' on' : ''}">${i + 1}</div>`).join('')}
            </div>
          </div>
        </div>
      </section>
      <section class="slide">
        <div class="slide-copy">
          <div class="icon-title"><span class="emoji">🌍</span>${c.s5h}</div>
          <p class="sub">${c.s5sub}</p>
          <div class="flags">🇹🇷 🇩🇪</div>
        </div>
      </section>
      <section class="slide">
        <div class="slide-copy">
          <div class="logo-mark">M</div>
          <h1>${c.s6h}</h1>
          <p class="sub">${c.s6sub}</p>
          <p class="cta">${c.cta}</p>
        </div>
        <span class="version">${c.ver}</span>
      </section>
    `;
  </script>
</body>
</html>
